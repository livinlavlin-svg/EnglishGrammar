function norm(s=""){return s.trim().toLowerCase().replace(/\s+/g," ").replace(/[''`]/g,"'");}
function checkAnswer(q,ans){
  if(q.type==="mc")return Number(ans)===q.correct;
  if(q.type==="fill")return q.ans.some(a=>norm(a)===norm(ans));
  if(q.type==="wo")return norm(ans)===norm(q.correct);
  return false;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getGrade(pct){
  if(pct>=91)return"Отлично! Present Perfect тебе покорился.";
  if(pct>=76)return"Хорошо! Ещё пара моментов — и всё встанет на место.";
  if(pct>=51)return"Уже лучше. Разбери ошибки и попробуй ещё раз.";
  return"Стоит повторить теорию — и попробовать снова.";
}

    {id:"3-10",type:"mc",en:"My dad ___ (buy) a new laptop in January.",ru:"Мой папа ___ (buy) новый ноутбук в январе.",opts:["bought","has bought","buy"],correct:0,expRu:"'In January' = конкретное прошлое → Past Simple: bought."},
    {id:"3-11",type:"mc",en:"I ___ (not do) my homework yet. I'll do it after dinner.",ru:"Я ещё ___ (not do) домашнее задание. Сделаю после ужина.",opts:["haven't done","didn't do","not done"],correct:0,expRu:"'Yet' в отрицании = маркер Present Perfect."},
    {id:"3-12",type:"mc",en:"She ___ (try) the new game for the first time last Friday.",ru:"Она ___ (try) новую игру впервые в прошлую пятницу.",opts:["tried","has tried","try"],correct:0,expRu:"'Last Friday' = конкретное прошлое → Past Simple: tried."},
  ]},
];

const TOTAL_Q=UNITS.reduce((a,u)=>a+u.questions.length,0);

let state={
  screen:"cover",
  unitIdx:0,qIdx:0,
  answers:{},   // id -> {correct, userAns, skipped}
  feedback:null,fillVal:"",wordPool:[],wordSel:[],
  showRef:true,
  em:{name:"",email:"",consent:false},emSt:"idle"
};

function setState(p){Object.assign(state,p);render();}

function initQ(u,qi){
  const q=u.questions[qi];
  return{fillVal:"",wordPool:q.type==="wo"?shuffle([...q.words]):[],wordSel:[],feedback:null};
}

function startUnit(ui){
  const u=UNITS[ui];
  setState({screen:"quiz",unitIdx:ui,qIdx:0,showRef:true,...initQ(u,0)});
}

function submit(userAns){
  const u=UNITS[state.unitIdx],q=u.questions[state.qIdx];
  const correct=checkAnswer(q,userAns);
  state.answers[q.id]={correct,userAns,skipped:false};
  const ca=q.type==="mc"?q.opts[q.correct]:q.type==="fill"?q.ans[0]:q.correct;
  setState({feedback:{correct,expRu:q.expRu,correctAns:ca}});
}

function skipQ(){
  const u=UNITS[state.unitIdx],q=u.questions[state.qIdx];
  state.answers[q.id]={correct:false,userAns:"",skipped:true};
  goNext(true);
}

function goNext(fromSkip=false){
  const u=UNITS[state.unitIdx];
  const lastQ=state.qIdx===u.questions.length-1;
  const lastU=state.unitIdx===UNITS.length-1;
  if(lastQ){
    setState({feedback:null,showRef:false,screen:lastU?"final":"unit_done"});
  } else {
    const nqi=state.qIdx+1;
    setState({...initQ(u,nqi),showRef:false,qIdx:nqi});
  }
}

function goToQ(qi){
  const u=UNITS[state.unitIdx];
  const already=state.answers[u.questions[qi].id];
  const fb=already&&!already.skipped
    ?{correct:already.correct,expRu:u.questions[qi].expRu,
      correctAns:u.questions[qi].type==="mc"?u.questions[qi].opts[u.questions[qi].correct]:u.questions[qi].ans?u.questions[qi].ans[0]:u.questions[qi].correct}
    :null;
  const fv=already&&already.userAns?already.userAns:"";
  setState({qIdx:qi,feedback:fb,fillVal:fv,
    wordPool:!fb&&u.questions[qi].type==="wo"?shuffle([...u.questions[qi].words]):[],
    wordSel:fb&&u.questions[qi].type==="wo"?(already.userAns?already.userAns.split(" "):[]):[],
  });
}

function goToUnit(ui){
  startUnit(ui);
}

function retryUnit(){
  const u=UNITS[state.unitIdx];
  u.questions.forEach(q=>delete state.answers[q.id]);
  startUnit(state.unitIdx);
}

function goNextUnit(){
  startUnit(state.unitIdx+1);
}

async function sendEmail(){
  const{em}=state;
  if(!em.name||!em.email||!em.consent)return;
  setState({emSt:"sending"});
  const correct=Object.values(state.answers).filter(a=>a.correct).length;
  const pct=Math.round(correct/TOTAL_Q*100);
  if(EJS_KEY==="YOUR_PUBLIC_KEY"){setTimeout(()=>setState({emSt:"sent"}),1400);return;}
  try{
    const r=await fetch("https://api.emailjs.com/api/v1.0/email/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({service_id:EJS_SERVICE,template_id:EJS_TMPL,user_id:EJS_KEY,template_params:{to_name:em.name,to_email:em.email,score:`${correct}/${TOTAL_Q}`,percentage:`${pct}%`,grade_message:getGrade(pct),taplink_url:TAPLINK}})});
    setState({emSt:r.ok?"sent":"error"});
  }catch{setState({emSt:"error"});}
}

function renderWoSlot(wordSel,feedback,q){
  if(!feedback){
    const inner=wordSel.length===0
      ?'<span class="wo-placeholder">Нажимай слова ниже...</span>'
      :wordSel.map((w,i)=>`<button class="chip-sel" onclick="tapSel(${i})">${w}</button>`).join("");
    return`<div class="wo-slot">${inner}</div>`;
  }
  if(feedback.correct){
    return`<div class="wo-slot ok">${wordSel.map(w=>`<span class="chip-sel-ok">${w}</span>`).join("")}</div>`;
  }
  const wrongChips=wordSel.map(w=>`<span style="background:#F5E8E6;border:1px solid #9A322850;border-radius:6px;padding:5px 10px;font-size:13px;color:#9A322880">${w}</span>`).join("");
  const correctChips=q.correct.split(" ").map(w=>`<span class="chip-sel-ok">${w}</span>`).join("");
  return`
    <div class="wo-slot err" style="margin-bottom:6px">${wrongChips||'<span style="font-size:12px;color:#9A322880">—</span>'}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:#EBF4EC;border-radius:10px;border:1.5px solid #4A7D4C;margin-bottom:10px;align-items:center">
      <span style="font-size:11px;color:#4A7D4C;margin-right:4px">✓</span>${correctChips}
    </div>`;
}

window.tapSel=function(i){if(state.feedback)return;const w=state.wordSel[i];state.wordSel.splice(i,1);state.wordPool.push(w);render();};
window.tapPool=function(i){if(state.feedback)return;const w=state.wordPool[i];state.wordPool.splice(i,1);state.wordSel.push(w);render();};

function unitStatus(ui){
  const u=UNITS[ui];
  const done=u.questions.filter(q=>state.answers[q.id]&&!state.answers[q.id].skipped).length;
  if(done===0)return"idle";
  if(done===u.questions.length)return"done";
  return"active";
}

function render(){
  const{screen:sc,unitIdx,qIdx,answers,feedback,fillVal,wordPool,wordSel,showRef,em,emSt}=state;
  const root=document.getElementById("root");

  // ── COVER ──────────────────────────────────────────
  if(sc==="cover"){
    const totalDone=Object.values(answers).filter(a=>a.correct).length;
    const hasProgress=Object.keys(answers).length>0;
    root.innerHTML=`
      <div style="padding-top:52px">
        <div style="font-size:11px;color:#8C7B6B;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Grammar Trainer</div>
        <h1 class="page-title">Present Perfect<br/>&amp; Past Simple</h1>
        <p style="font-size:14px;color:#8C7B6B;margin-bottom:10px;line-height:1.7">
          Три юнита, 36 заданий.<br/>
          Правила, примеры и практика — в одном тесте.
        </p>
        ${hasProgress?`<div style="font-size:12px;color:#4A7D4C;margin-bottom:24px">✓ Прогресс сохранён: ${totalDone} правильных</div>`:`<div style="margin-bottom:24px"></div>`}

        <div style="margin-bottom:20px">
          ${UNITS.map((u,i)=>{
            const st=unitStatus(i);
            const correct=u.questions.filter(q=>answers[q.id]?.correct).length;
            const statusBadge=st==="done"
              ?`<span style="font-size:10px;color:#4A7D4C;background:#EBF4EC;padding:2px 7px;border-radius:4px;margin-left:6px">✓ ${correct}/${u.questions.length}</span>`
              :st==="active"
              ?`<span style="font-size:10px;color:#C9A882;background:#C9A88218;padding:2px 7px;border-radius:4px;margin-left:6px">${correct}/${u.questions.length}</span>`
              :"";
            return`<div class="cover-unit-card" onclick="startUnit(${i})">
              <div class="cover-num">${i+1}</div>
              <div style="flex:1">
                <div class="cover-unit-title">${u.en} — ${u.subEn} ${statusBadge}</div>
                <div class="cover-unit-sub">${u.desc}</div>
                <div style="margin-top:7px">${u.tags.map(t=>`<span class="cover-tag">${t}</span>`).join("")}</div>
              </div>
              <div style="font-size:18px;color:#C9A882;align-self:center;padding-left:4px">›</div>
            </div>`;
          }).join("")}
        </div>

        <button class="btn-primary" onclick="startUnit(0)">
          ${hasProgress?"Продолжить тест →":"Начать с Unit 1 →"}
        </button>
      </div>`;
    return;
  }

  const unit=UNITS[unitIdx];

  // ── UNIT DONE ─────────────────────────────────────
  if(sc==="unit_done"){
    const correct=unit.questions.filter(q=>answers[q.id]?.correct).length;
    const total=unit.questions.length,pct=Math.round(correct/total*100),good=pct>=70;
    const isLast=unitIdx===UNITS.length-1;
    root.innerHTML=`
      <div style="padding-top:54px">
        <div class="section-label">Unit ${unit.id} завершён</div>
        <h2 class="result-title">${unit.en}<br/><span style="font-weight:400;font-size:24px">${unit.subEn}</span></h2>
        <div class="card" style="text-align:center;padding:30px 20px;margin-bottom:16px">
          <div class="score-big ${good?"score-ok":"score-err"}">${correct}</div>
          <div style="font-size:13px;color:#8C7B6B;margin-top:4px">из ${total} правильно · ${pct}%</div>
          <div class="prog-line"><div class="prog-fill" style="width:${pct}%;background:${good?"#4A7D4C":"#9A3228"}"></div></div>
        </div>
        ${!isLast?`<button class="btn-primary" onclick="goNextUnit()">Следующий юнит →</button>`:""}
        <button class="${isLast?"btn-primary":"btn-secondary"}" onclick="setState({screen:'final'})">
          ${isLast?"Завершить тест →":"Завершить тест"}
        </button>
        <button class="btn-secondary" style="margin-top:10px" onclick="retryUnit()">Повторить юнит</button>
        <button class="btn-ghost" style="width:100%;justify-content:center;margin-top:6px" onclick="setState({screen:'cover'})">← Вернуться к содержанию</button>
      </div>`;
    return;
  }

  // ── FINAL ─────────────────────────────────────────
  if(sc==="final"){
    const correct=Object.values(answers).filter(a=>a.correct).length;
    const pct=Math.round(correct/TOTAL_Q*100),msg=getGrade(pct),good=pct>=70;
    const emailForm=emSt!=="sent"?`
      <div class="card">
        <p style="font-size:14px;color:#2B2521;margin-bottom:16px;line-height:1.6">Получи результат на почту — и узнай, как продолжить работу над английским.</p>
        <input class="input-field" type="text" placeholder="Твоё имя" value="${em.name}" oninput="state.em.name=this.value"/>
        <input class="input-field" type="email" placeholder="Email" value="${em.email}" oninput="state.em.email=this.value"/>
        <label class="checkbox-row">
          <input type="checkbox" ${em.consent?"checked":""} onchange="state.em.consent=this.checked" style="margin-top:2px;accent-color:#C9A882"/>
          <span class="checkbox-text">Согласен(а) получить письмо с результатом</span>
        </label>
        <button class="btn-primary" style="opacity:${em.name&&em.email&&em.consent?1:.45}" onclick="sendEmail()" ${emSt==="sending"?"disabled":""}>
          ${emSt==="sending"?"Отправляем...":"Отправить результат →"}
        </button>
        ${emSt==="error"?'<p class="err-msg">Что-то пошло не так. Попробуй ещё раз.</p>':""}
      </div>`:`
      <div class="card" style="text-align:center;padding:28px">
        <div style="width:36px;height:36px;border-radius:50%;background:#EBF4EC;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:18px;color:#4A7D4C">✓</div>
        <p style="font-size:15px;font-weight:500;margin:0 0 8px">Результат отправлен!</p>
        <p style="font-size:13px;color:#8C7B6B;line-height:1.6;margin:0 0 22px">Если хочешь разобраться с английским глубже —</p>
        <a href="${TAPLINK}" class="taplink-btn">@speakenglish.kate →</a>
      </div>`;
    root.innerHTML=`
      <div style="padding-top:54px">
        <div class="section-label">Тест завершён</div>
        <h2 class="result-title">Итоговый<br/>результат</h2>
        <div class="card" style="text-align:center;padding:28px 20px;margin-bottom:20px">
          <div class="score-big ${good?"score-ok":"score-err"}">${correct}</div>
          <div style="font-size:13px;color:#8C7B6B;margin-top:4px">из ${TOTAL_Q} правильно · ${pct}%</div>
          <div class="prog-line"><div class="prog-fill" style="width:${pct}%;background:${good?"#4A7D4C":"#9A3228"}"></div></div>
          <p style="font-size:14px;color:#2B2521;line-height:1.6;margin:14px 0 0">${msg}</p>
        </div>
        ${emailForm}
        <button class="btn-ghost" style="width:100%;justify-content:center;margin-top:12px" onclick="setState({screen:'cover'})">← К содержанию</button>
      </div>`;
    return;
  }

  // ── QUIZ ──────────────────────────────────────────
  const q=unit.questions[qIdx];
  const unitTotal=unit.questions.length;
  const progPct=(qIdx/unitTotal)*100;
  const lastQ=qIdx===unitTotal-1;
  const lastU=unitIdx===UNITS.length-1;
  const nextLabel=lastQ?(lastU?"Завершить тест →":"Следующий юнит →"):"Далее →";

  // dots
  const dots=unit.questions.map((qq,i)=>{
    const a=answers[qq.id];
    let cls="dot";
    if(i===qIdx)cls+=" current";
    else if(a&&a.correct)cls+=" done";
    else if(a&&a.skipped)cls+=" skipped";
    return`<span class="${cls}" onclick="goToQ(${i})" style="cursor:pointer"></span>`;
  }).join("");

  // answer area
  let answerHtml="";
  if(q.type==="mc"){
    answerHtml=q.opts.map((opt,i)=>{
      let cls="mc-btn";
      if(feedback){
        if(i===q.correct)cls+=" ok";
        else if(i===Number(answers[q.id]?.userAns)&&!feedback.correct)cls+=" err";
        else cls+=" dim";
      }
      return`<button class="${cls}" onclick="if(!state.feedback)submit(${i})">${opt}</button>`;
    }).join("");
  } else if(q.type==="fill"){
    const fcls=feedback?(feedback.correct?"ok":"err"):"";
    answerHtml=`
      <div class="fill-wrap">
        <input class="fill-input ${fcls}" type="text" value="${fillVal.replace(/"/g,"&quot;")}"
          placeholder="Введи ответ..." ${feedback?"disabled":""}
          oninput="state.fillVal=this.value"
          onkeydown="if(event.key==='Enter'&&!state.feedback&&state.fillVal.trim())submit(state.fillVal.trim())"/>
        ${!feedback?`<button class="fill-ok-btn" onclick="if(state.fillVal.trim())submit(state.fillVal.trim())">OK</button>`:""}
      </div>
      ${!feedback?`<div class="skip-row"><button class="btn-skip" onclick="skipQ()">Пропустить →</button></div>`:""}`;
  } else if(q.type==="wo"){
    answerHtml=`
      ${renderWoSlot(wordSel,feedback,q)}
      ${!feedback?`<div class="wo-pool">${wordPool.map((w,i)=>`<button class="chip-pool" onclick="tapPool(${i})">${w}</button>`).join("")}</div>`:""}
      ${!feedback&&wordSel.length===q.words.length?`<button class="btn-primary" style="width:auto;padding:11px 28px" onclick="submit(state.wordSel.join(' '))">Проверить</button>`:""}`;
  }

  const fbHtml=feedback?`
    <div class="fb ${feedback.correct?"ok":"err"}">
      <div class="fb-title ${feedback.correct?"ok":"err"}">${feedback.correct?"Правильно!":q.type==="wo"?"Посмотри на правильный порядок выше":"Правильный ответ: "+feedback.correctAns}</div>
      <div class="fb-exp">${feedback.expRu}</div>
    </div>`:"";

  const refContent=showRef?`
    <div class="card" style="padding:14px 16px;margin-bottom:14px">
      ${unit.refLines.map(([en,ru])=>`<div style="margin-bottom:6px"><div class="ref-en">${en}</div><div class="ref-ru">${ru}</div></div>`).join("")}
      ${unit.verbs?`
        <div style="margin-top:12px;border-top:1px solid #F2EDE4;padding-top:12px">
          <div style="font-size:10px;color:#8C7B6B;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">Irregular Verbs</div>
          <table class="irr-table"><thead><tr>
            <th class="irr-th">Base</th><th class="irr-th">Past Simple</th><th class="irr-th">Past Participle</th>
          </tr></thead><tbody>
            ${unit.verbs.map(([b,ps,pp],i)=>`<tr style="background:${i%2?"#C9A88212":"transparent"}"><td class="irr-td irr-b">${b}</td><td class="irr-td">${ps}</td><td class="irr-td">${pp}</td></tr>`).join("")}
          </tbody></table>
        </div>`:""}
    </div>`:"";

  // unit jump pills
  const jumpPills=UNITS.map((u,i)=>{
    const st=unitStatus(i);
    let cls="unit-pill";
    if(i===unitIdx)cls+=" active";
    else if(st==="done")cls+=" done";
    return`<button class="${cls}" onclick="goToUnit(${i})">Unit ${i+1}<br/><span style="font-weight:400;font-size:10px;opacity:.8">${u.subEn.split(",")[0]}</span></button>`;
  }).join("");

  root.innerHTML=`
    <div class="prog-wrap"><div class="prog-bar" style="width:${progPct}%"></div></div>
    <div style="padding-top:16px">

      <!-- unit jump -->
      <div class="unit-jump">${jumpPills}</div>

      <!-- header row -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div class="unit-title">${unit.en}</div>
          <div class="unit-sub">${unit.subRu}</div>
        </div>
        <span class="counter">${qIdx+1} / ${unitTotal}</span>
      </div>

      <!-- nav bar with dots -->
      <div class="nav-bar">
        <button class="nav-arrow" onclick="if(${qIdx}>0)goToQ(${qIdx-1})" ${qIdx===0?"disabled":""}>‹</button>
        <div class="nav-dots">${dots}</div>
        <button class="nav-arrow" onclick="goToQ(${Math.min(qIdx+1,unitTotal-1)})" ${qIdx===unitTotal-1?"disabled":""}>›</button>
      </div>

      <!-- rule toggle -->
      <button class="ref-toggle" onclick="setState({showRef:!state.showRef})">
        <span style="display:inline-block;transition:transform .2s;transform:${showRef?"rotate(90deg)":"none"};font-size:9px">▶</span>
        &nbsp;Правило / Rule
      </button>
      ${refContent}

      <!-- question card -->
      <div class="card" style="margin-bottom:12px">
        ${q.en?`<div class="q-en">${q.en}</div>`:""}
        ${q.ru?`<div class="q-ru">${q.ru}</div>`:""}
      </div>

      ${answerHtml}
      ${fbHtml}
      ${feedback?`<button class="btn-primary" onclick="goNext()">${nextLabel}</button>`:""}

      <!-- back to cover -->
      <div style="text-align:center;margin-top:14px">
        <button class="btn-ghost" onclick="setState({screen:'cover'})">← Содержание</button>
      </div>
    </div>`;
}

render();
</script>
